<!DOCTYPE HTML>
<html lang="en">
    <head>
        <meta charset = "utf-8" />
        <meta http-equiv="CACHE-CONTROL" CONTENT = "NO-CACHE" />
        <meta name = "viewport" content = "width=device-width, initial-scale=1" />
        <title>실시간 온도, 습도 측정기</title>
        <link rel = "stylesheet" href = "//code.jquery.com/mobile/1.4.3/jquery.mobile-1.4.3.min.css" />
        <script src="//code.jquery.com/jquery-1.11.1.min.js"></script>
        <script src="//code.jquery.com/mobile/1.4.3/jquery.mobile-1.4.3.min.js"></script>
        <script src="//cdnjs.cloudflare.com/ajax/libs/socket.io/4.5.0/socket.io.js"></script>
        <script src="//cdnjs.cloudflare.com/ajax/libs/highcharts/4.0.4/highcharts.js"></script>
        <script>
            var temp_chart;  // 온도
            var humi_chart;  // 습도
            var socket = io();
            socket.on('connect', function()
                {
                    socket.emit('join_web', {room:'WEB'});
                }
            );
            socket.on('dht_chart', function(msg)
                {
                    var data = msg.data;
                    var t = new Date();
                    // t.setHours(t.getHours() + 9);
                    tempchartAddPoint([t.getTime(), Number(data.temperature)]);
                    humichartAddPoint([t.getTime(), Number(data.humidity)]);
                }
            );
            function tempchartAddPoint(tVal)
            {
                var series = temp_chart.series[0],
                shift = series.data.length > 20;
                temp_chart.series[0].addPoint(eval(tVal), true, shift);
            }

            function humichartAddPoint(hVal)
            {
                var series2 = humi_chart.series[0],
                shift2 = series2.data.length > 20;
                humi_chart.series[0].addPoint(eval(hVal), true, shift2);
            }

            $(function()
                {
                    // 온도
                    temp_chart = new Highcharts.Chart(
                        {
                            chart: { renderTo: 'temp', defaultSeriesType: 'spline' },
                            title: { text: '실시간 온도 데이터' },
                            xAxis: { type: 'datetime', tickPixelInterval: 120, maxZoom: 20 * 1000 },
                            yAxis: { 
                                minPadding: 0.2, maxPadding:0.2, 
                                title: { text: '온도 ( C )', margin:20 }
                            },
                            series: [{ name: '온도', data: [] }]
                        }
                    );
                    
                    // 습도
                    humi_chart = new Highcharts.Chart(
                        {
                            chart: { renderTo: 'humi', defaultSeriesType: 'spline' },
                            title: { text: '실시간 습도 데이터' },
                            xAxis: { type: 'datetime', tickPixelInterval: 120, maxZoom: 20 * 1000 },
                            yAxis: { 
                                minPadding: 0.2, maxPadding:0.2, 
                                title: { text: '습도 ( % )', margin:20 }
                            },
                            series: [{ name: '습도', data: [] }]
                        }
                    );
                }
            );
        </script>
    </head>
    <body>
        <div id = "temp" style="width: 100%; height: 300px; margin-left:-5px;"></div>
        <div id = "humi" style="width: 100%; height: 300px; margin-left:-5px;"></div>
    </body>
</html>
